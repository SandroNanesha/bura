<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bura — Card Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: "Space Grotesk", sans-serif; -webkit-user-select: none; user-select: none; }
    /* Prevent iOS zoom on input focus */
    input, textarea, select { font-size: 16px !important; }

    /* ═══ Card sizing ═══ */
    .bura-card {
      --cw: 4.5rem;
      position: relative;
      width: var(--cw);
      aspect-ratio: 2/3;
      border-radius: 0.5rem;
      border: solid 2px transparent;
      overflow: hidden;
      cursor: pointer;
      transform-origin: center center;
      transition: transform 0.35s ease, border-color 0.25s ease, filter 0.25s ease, box-shadow 0.3s ease;
      box-shadow: 1px 1px 5px 1px rgba(150, 150, 150, 0.15);
    }
    .bura-card-small  { --cw: 2.8rem; border-radius: 0.3rem; }
    .bura-card-medium { --cw: 3.4rem; border-radius: 0.4rem; }
    .bura-card-normal { --cw: 4.5rem; }
    @media (min-width: 640px) {
      .bura-card-normal { --cw: 5.2rem; }
      .bura-card-medium { --cw: 4.2rem; }
      .bura-card-small  { --cw: 3.2rem; }
    }

    /* ═══ Card back ═══ */
    .card-back-inner {
      position: absolute; inset: 8%;
      border-radius: 0.3rem;
      border: 1.5px solid rgba(147, 197, 253, 0.2);
    }

    /* ═══ Card face ═══ */
    .card-red  { color: #de4b4b; }
    .card-black { color: #141414; }

    .card-corner {
      display: flex; flex-direction: column; align-items: center;
      padding: calc(var(--cw) * 0.06); line-height: 1;
    }
    .card-corner-rank { font-size: calc(var(--cw) * 0.32); font-weight: 700; }
    .card-corner-suit { font-size: calc(var(--cw) * 0.24); margin-top: calc(var(--cw) * -0.02); }
    .card-center-suit {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      font-size: calc(var(--cw) * 0.9);
      opacity: 0.15; line-height: 1; pointer-events: none;
    }

    /* ═══ Card states ═══ */
    .card-selected {
      border-color: #facc15 !important;
      transform: translateY(-0.6rem) scale(1.05);
      box-shadow: 0 0 10px 2px rgba(250, 204, 21, 0.45), 0 0 20px rgba(250, 204, 21, 0.2);
    }
    .card-clickable:hover { filter: brightness(1.04); transform: translateY(-0.35rem); }
    .card-clickable:active { transform: scale(0.96); }
    .card-disabled { opacity: 0.55; cursor: default !important; }

    /* ═══ Hand fan ═══ */
    .hand-fan > *:nth-child(1) { --fan: -10deg; }
    .hand-fan > *:nth-child(2) { --fan: 0deg; }
    .hand-fan > *:nth-child(3) { --fan: 10deg; }
    .hand-fan > * {
      transform-origin: center 140%;
      rotate: var(--fan, 0deg);
      transition: rotate 0.35s ease, transform 0.35s ease;
    }

    /* ═══ DEAL: cards fly from stock (left sidebar) into my hand ═══ */
    @keyframes deal-to-hand {
      0% {
        opacity: 0;
        transform: translate(-30vw, -10vh) scale(0.35) rotate(20deg);
        filter: brightness(0.6);
      }
      35% {
        opacity: 1;
        transform: translate(-10vw, 2vh) scale(0.75) rotate(-6deg);
        filter: brightness(0.9);
      }
      70% {
        transform: translate(-1vw, -4px) scale(1.05) rotate(2deg);
        filter: brightness(1.05);
      }
      85% {
        transform: translate(0.5vw, 2px) scale(0.98) rotate(-0.5deg);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
        filter: brightness(1);
      }
    }

    /* ═══ DEAL for opponent: cards fly from stock to opponent area ═══ */
    @keyframes deal-to-opp {
      0% {
        opacity: 0;
        transform: translate(-30vw, 8vh) scale(0.35) rotate(-20deg);
        filter: brightness(0.6);
      }
      35% {
        opacity: 1;
        transform: translate(-10vw, -2vh) scale(0.75) rotate(6deg);
        filter: brightness(0.9);
      }
      70% {
        transform: translate(-1vw, 3px) scale(1.05) rotate(-2deg);
        filter: brightness(1.05);
      }
      85% {
        transform: translate(0.5vw, -1px) scale(0.98) rotate(0.5deg);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
        filter: brightness(1);
      }
    }

    /* ═══ PLAY: my card slides from hand up to center table ═══ */
    @keyframes play-to-table {
      0% {
        opacity: 0.6;
        transform: translateY(70px) scale(0.75) rotate(var(--play-rot, 3deg));
        filter: brightness(0.85);
      }
      50% {
        opacity: 1;
        transform: translateY(-4px) scale(1.03) rotate(calc(var(--play-rot, 3deg) * -0.15));
        filter: brightness(1.05);
      }
      80% {
        transform: translateY(1px) scale(0.99) rotate(0deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
        filter: brightness(1);
      }
    }

    /* ═══ PLAY from opponent: card slides from top down ═══ */
    @keyframes play-from-opp {
      0% {
        opacity: 0.6;
        transform: translateY(-70px) scale(0.75) rotate(var(--play-rot, -3deg));
        filter: brightness(0.85);
      }
      50% {
        opacity: 1;
        transform: translateY(4px) scale(1.03) rotate(calc(var(--play-rot, -3deg) * -0.15));
        filter: brightness(1.05);
      }
      80% {
        transform: translateY(-1px) scale(0.99) rotate(0deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
        filter: brightness(1);
      }
    }

    /* ═══ COLLECT: trick cards sweep toward winner's pile ═══ */
    @keyframes collect-to-pile {
      0%   { opacity: 1; transform: scale(1) rotate(0deg); }
      35%  { opacity: 1; transform: scale(0.92) rotate(2deg) translateY(var(--collect-y, 0px)); }
      70%  { opacity: 0.7; transform: scale(0.5) rotate(6deg) translate(var(--collect-x, 60px), var(--collect-y, 30px)); }
      100% { opacity: 0; transform: scale(0.25) rotate(10deg) translate(var(--collect-x, 80px), var(--collect-y, 40px)); }
    }

    /* ═══ Pile pulse when cards added ═══ */
    @keyframes pile-collect {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.12); }
      70%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    /* ═══ Showdown ═══ */
    @keyframes showdown-glow {
      0%   { filter: brightness(1); }
      50%  { filter: brightness(1.2) drop-shadow(0 0 8px rgba(251,191,36,0.4)); }
      100% { filter: brightness(1); }
    }
    @keyframes badge-bounce {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.3) translateY(10px); }
      60%  { opacity: 1; transform: translateX(-50%) scale(1.15) translateY(-3px); }
      100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    }

    /* ═══ Slide-deal: generic card entrance (used on hand cards) ═══ */
    @keyframes slide-deal {
      0% {
        opacity: 0;
        transform: translate(-30vw, -10vh) scale(0.35) rotate(18deg);
        filter: brightness(0.6);
      }
      30% {
        opacity: 1;
        transform: translate(-8vw, 1vh) scale(0.8) rotate(-5deg);
        filter: brightness(0.9);
      }
      65% {
        transform: translate(-0.5vw, -3px) scale(1.04) rotate(1.5deg);
        filter: brightness(1.05);
      }
      85% {
        transform: translate(0.3vw, 1px) scale(0.98) rotate(-0.3deg);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
        filter: brightness(1);
      }
    }

    /* ═══ Slide-deal for opponent cards ═══ */
    @keyframes slide-deal-opp {
      0% {
        opacity: 0;
        transform: translate(-30vw, 8vh) scale(0.35) rotate(-18deg);
        filter: brightness(0.6);
      }
      30% {
        opacity: 1;
        transform: translate(-8vw, -1vh) scale(0.8) rotate(5deg);
        filter: brightness(0.9);
      }
      65% {
        transform: translate(-0.5vw, 2px) scale(1.04) rotate(-1.5deg);
        filter: brightness(1.05);
      }
      85% {
        transform: translate(0.3vw, -1px) scale(0.98) rotate(0.3deg);
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
        filter: brightness(1);
      }
    }

    /* ═══ Trick enter: my card played to table ═══ */
    @keyframes trick-enter {
      0% {
        opacity: 0.5;
        transform: translateY(80px) scale(0.7) rotate(3deg);
        filter: brightness(0.8) drop-shadow(0 0 0 transparent);
      }
      60% {
        opacity: 1;
        transform: translateY(-3px) scale(1.02) rotate(-0.5deg);
        filter: brightness(1.05) drop-shadow(0 4px 12px rgba(0,0,0,0.25));
      }
      85% {
        transform: translateY(1px) scale(0.99) rotate(0deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
        filter: brightness(1) drop-shadow(0 2px 6px rgba(0,0,0,0.15));
      }
    }

    /* ═══ Trick enter: opponent card played to table ═══ */
    @keyframes trick-enter-opp {
      0% {
        opacity: 0.5;
        transform: translateY(-80px) scale(0.7) rotate(-3deg);
        filter: brightness(0.8) drop-shadow(0 0 0 transparent);
      }
      60% {
        opacity: 1;
        transform: translateY(3px) scale(1.02) rotate(0.5deg);
        filter: brightness(1.05) drop-shadow(0 4px 12px rgba(0,0,0,0.25));
      }
      85% {
        transform: translateY(-1px) scale(0.99) rotate(0deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
        filter: brightness(1) drop-shadow(0 2px 6px rgba(0,0,0,0.15));
      }
    }

    /* ═══ Card leave hand (shrink out when played) ═══ */
    @keyframes card-leave {
      0% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
      100% {
        opacity: 0;
        transform: scale(0.3) translateY(-40px);
      }
    }

    /* ═══ Animation classes ═══ */
    .anim-deal-hand     { animation: deal-to-hand 1.1s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .anim-deal-opp      { animation: deal-to-opp  1.1s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .anim-play-table    { animation: play-to-table 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .anim-play-from-opp { animation: play-from-opp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .anim-collect       { animation: collect-to-pile 0.9s cubic-bezier(0.4, 0, 0.2, 1) both; }
    .animate-pile-collect     { animation: pile-collect 0.6s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .animate-showdown-glow    { animation: showdown-glow 1.8s ease-in-out infinite; }
    .animate-badge-bounce     { animation: badge-bounce 0.7s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .animate-slide-deal       { animation: slide-deal 1.1s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .animate-slide-deal-opp   { animation: slide-deal-opp 1.1s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .animate-trick-enter      { animation: trick-enter 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .animate-trick-enter-opp  { animation: trick-enter-opp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) both; }
    .animate-card-leave       { animation: card-leave 0.5s cubic-bezier(0.4, 0, 0.6, 1) both; }

    /* ═══ Deal sequence animations ═══ */
    .deal-card-enter-me {
      will-change: transform, opacity;
      animation: deal-fly-down 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) both;
    }
    .deal-card-enter-opp {
      will-change: transform, opacity;
      animation: deal-fly-up 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) both;
    }
    .deal-trump-reveal {
      will-change: transform, opacity;
      animation: deal-trump-flip 0.9s cubic-bezier(0.25, 0.8, 0.25, 1) both;
    }

    @keyframes deal-fly-down {
      0% {
        opacity: 0;
        transform: translateY(-100px) scale(0.5) rotate(-4deg);
        filter: brightness(0.6);
      }
      40% {
        opacity: 1;
        transform: translateY(-20px) scale(0.9) rotate(1.5deg);
        filter: brightness(0.95);
      }
      75% {
        transform: translateY(2px) scale(1.02) rotate(-0.3deg);
        filter: brightness(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
        filter: brightness(1);
      }
    }

    @keyframes deal-fly-up {
      0% {
        opacity: 0;
        transform: translateY(100px) scale(0.5) rotate(4deg);
        filter: brightness(0.6);
      }
      40% {
        opacity: 1;
        transform: translateY(20px) scale(0.9) rotate(-1.5deg);
        filter: brightness(0.95);
      }
      75% {
        transform: translateY(-2px) scale(1.02) rotate(0.3deg);
        filter: brightness(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
        filter: brightness(1);
      }
    }

    @keyframes deal-trump-flip {
      0% {
        opacity: 0;
        transform: scale(0.5) rotateY(80deg);
        filter: brightness(0.5);
      }
      50% {
        opacity: 1;
        transform: scale(1.03) rotateY(-5deg);
        filter: brightness(1.05);
      }
      80% {
        transform: scale(0.99) rotateY(1deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotateY(0deg);
        filter: brightness(1);
      }
    }

    /* ═══ Chat animations ═══ */
    @keyframes chat-open {
      0% { opacity: 0; transform: translateY(10px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toast-in {
      0% { opacity: 0; transform: translateX(40px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes bounce-in {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .animate-chat-open { animation: chat-open 0.2s ease-out both; }
    .animate-toast-in  { animation: toast-in 0.3s ease-out both; }
    .animate-bounce-in { animation: bounce-in 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }

    /* ═══ Cyber button (დავი modal) ═══ */
    .cyber-btn {
      --cyber-accent: #fbbf24;
      --cyber-shadow: #ef4444;
      --cyber-bg: rgba(0,0,0,0.7);
      position: relative;
      padding: 0.7rem 2rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cyber-accent);
      background: var(--cyber-bg);
      border: 2px solid var(--cyber-accent);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      cursor: pointer;
      transition: all 0.15s;
      outline: none;
    }
    .cyber-btn::before,
    .cyber-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
    }
    .cyber-btn::before {
      background: var(--cyber-accent);
      mix-blend-mode: overlay;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }
    .cyber-btn::after {
      background: var(--cyber-shadow);
      mix-blend-mode: overlay;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }
    .cyber-btn:hover {
      box-shadow: 0 0 20px 2px var(--cyber-accent), inset 0 0 20px 2px rgba(251,191,36,0.15);
    }
    .cyber-btn:hover::before { opacity: 0.15; }
    .cyber-btn:active {
      transform: scale(0.96);
    }
    /* Glitch tag on bottom-right corner */
    .cyber-btn .cyber-tag {
      position: absolute;
      right: -1px;
      bottom: -1px;
      padding: 1px 6px;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      background: var(--cyber-accent);
      color: #000;
      clip-path: polygon(6px 0, 100% 0, 100% 100%, 0 100%);
    }
    /* Glitch animation on hover */
    .cyber-btn:hover .cyber-glitch {
      animation: cyber-glitch 0.3s steps(2) infinite;
    }
    @keyframes cyber-glitch {
      0%   { clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); transform: translate(0); }
      25%  { clip-path: polygon(2px 4px, calc(100% - 8px) 2px, 100% 12px, 98% 100%, 8px 98%, 2px calc(100% - 8px)); transform: translate(-2px, 1px); }
      50%  { clip-path: polygon(0 2px, calc(100% - 12px) 0, 100% 8px, 100% 98%, 12px 100%, 0 calc(100% - 12px)); transform: translate(2px, -1px); }
      75%  { clip-path: polygon(1px 0, calc(100% - 10px) 1px, 100% 11px, 99% 100%, 10px 99%, 1px calc(100% - 10px)); transform: translate(-1px, 0); }
      100% { clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); transform: translate(0); }
    }
    /* Green variant (accept) */
    .cyber-btn--accept {
      --cyber-accent: #22c55e;
      --cyber-shadow: #16a34a;
    }
    /* Red variant (decline) */
    .cyber-btn--decline {
      --cyber-accent: #ef4444;
      --cyber-shadow: #dc2626;
    }
    /* Amber variant (propose) */
    .cyber-btn--propose {
      --cyber-accent: #fbbf24;
      --cyber-shadow: #f59e0b;
    }

    /* დავი modal entrance */
    @keyframes davi-modal-in {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
        filter: blur(4px) brightness(0.5);
      }
      40% {
        opacity: 1;
        transform: scale(1.04) translateY(-4px);
        filter: blur(0) brightness(1.15);
      }
      70% {
        transform: scale(0.98) translateY(1px);
        filter: brightness(1.05);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: brightness(1);
      }
    }
    @keyframes davi-glow-pulse {
      0%, 100% { box-shadow: 0 0 20px 4px rgba(251,191,36,0.2), inset 0 0 30px rgba(251,191,36,0.05); }
      50%      { box-shadow: 0 0 40px 8px rgba(251,191,36,0.35), inset 0 0 40px rgba(251,191,36,0.1); }
    }
    @keyframes davi-scanline {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100%; }
    }
    .davi-modal {
      animation: davi-modal-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 davi-glow-pulse 2s ease-in-out infinite 0.5s;
      position: relative;
      overflow: hidden;
    }
    /* Scanline overlay */
    .davi-modal::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(251,191,36,0.03) 2px,
        rgba(251,191,36,0.03) 4px
      );
      background-size: 100% 4px;
      animation: davi-scanline 8s linear infinite;
      pointer-events: none;
      z-index: 1;
      border-radius: inherit;
    }
    /* Corner cuts on the modal */
    .davi-modal {
      clip-path: polygon(
        0 12px, 12px 0, calc(100% - 12px) 0, 100% 12px,
        100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px)
      );
    }
    /* Flicker on backdrop */
    @keyframes davi-backdrop-flicker {
      0%, 100% { opacity: 0.6; }
      5% { opacity: 0.62; }
      10% { opacity: 0.58; }
      50% { opacity: 0.6; }
      52% { opacity: 0.55; }
      55% { opacity: 0.6; }
    }
    .davi-backdrop {
      animation: davi-backdrop-flicker 4s ease-in-out infinite;
    }

    /* ═══ Trump glow ═══ */
    .trump-glow {
      box-shadow: 0 0 18px 4px rgba(251,191,36,0.35), 0 6px 20px rgba(0,0,0,0.4);
      border-radius: 0.5rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
