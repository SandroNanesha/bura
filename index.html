<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bura — Card Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Card base ── */
    .game-card {
      transition: rotate 0.2s ease-in-out, transform 0.25s ease-in-out, box-shadow 0.25s ease, filter 0.2s ease;
      box-shadow:
        0px 0px 2.2px rgba(0, 0, 0, 0.02),
        0px 0px 5.3px rgba(0, 0, 0, 0.028),
        0px 0px 10px rgba(0, 0, 0, 0.035),
        0px 0px 17.9px rgba(0, 0, 0, 0.042),
        0px 0px 33.4px rgba(0, 0, 0, 0.05),
        0px 0px 80px rgba(0, 0, 0, 0.07);
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .game-card:hover {
      filter: brightness(1.05);
    }
    .game-card.card-selected {
      box-shadow:
        0 0 10px 2px rgba(250, 204, 21, 0.5),
        0px 0px 20px rgba(250, 204, 21, 0.3);
    }

    /* ── Deal: slide from top-right with rotation ── */
    @keyframes slide-deal {
      0% {
        opacity: 0;
        transform: translateX(40vw) translateY(-30vh) rotate(35deg) scale(0.5);
      }
      40% { opacity: 1; }
      75% {
        transform: translateX(0) translateY(0) rotate(0) scale(1.03);
      }
      100% {
        transform: translateX(0) translateY(0) rotate(0) scale(1);
      }
    }

    /* ── Play card onto table: from bottom ── */
    @keyframes trick-enter {
      0%   { opacity: 0; transform: translateY(80px) scale(0.5) rotateX(25deg); filter: blur(3px); }
      50%  { opacity: 1; transform: translateY(-6px) scale(1.08) rotateX(-2deg); filter: blur(0); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0); }
    }

    /* ── Play card onto table: from top (opponent) ── */
    @keyframes trick-enter-opp {
      0%   { opacity: 0; transform: translateY(-80px) scale(0.5) rotateX(-25deg); filter: blur(3px); }
      50%  { opacity: 1; transform: translateY(6px) scale(1.08) rotateX(2deg); filter: blur(0); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0); }
    }

    /* ── Pile collect pulse ── */
    @keyframes pile-collect {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    /* ── Showdown glow ── */
    @keyframes showdown-glow {
      0%   { filter: brightness(1) drop-shadow(0 0 0 transparent); }
      50%  { filter: brightness(1.15) drop-shadow(0 0 6px rgba(251, 191, 36, 0.4)); }
      100% { filter: brightness(1) drop-shadow(0 0 0 transparent); }
    }

    /* ── Winner badge bounce ── */
    @keyframes badge-bounce {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.3) translateY(10px); }
      60%  { opacity: 1; transform: translateX(-50%) scale(1.15) translateY(-3px); }
      100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    }

    .animate-slide-deal {
      animation: slide-deal 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .animate-trick-enter {
      animation: trick-enter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .animate-trick-enter-opp {
      animation: trick-enter-opp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .animate-pile-collect {
      animation: pile-collect 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .animate-showdown-glow {
      animation: showdown-glow 1.2s ease-in-out infinite;
    }
    .animate-badge-bounce {
      animation: badge-bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ── Trump card glow ── */
    .trump-glow {
      box-shadow: 0 0 18px 4px rgba(251, 191, 36, 0.35), 0 6px 20px rgba(0,0,0,0.4);
      border-radius: 0.5rem;
    }

    /* ── Fan hand: slight rotation per card ── */
    .hand-fan > *:nth-child(1) { --fan: -8deg; }
    .hand-fan > *:nth-child(2) { --fan: 0deg; }
    .hand-fan > *:nth-child(3) { --fan: 8deg; }
    .hand-fan > * {
      transform-origin: center 120%;
      rotate: var(--fan, 0deg);
      transition: rotate 0.2s ease, transform 0.25s ease;
    }
    .hand-fan > *:hover {
      transform: translateY(-8px) scale(1.04);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
