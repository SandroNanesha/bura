<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bura — Card Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes trick-enter {
      0%   { opacity: 0; transform: translateY(40px) scale(0.7) rotate(-8deg); }
      60%  { opacity: 1; transform: translateY(-6px) scale(1.05) rotate(1deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    }
    @keyframes trick-enter-opp {
      0%   { opacity: 0; transform: translateY(-40px) scale(0.7) rotate(8deg); }
      60%  { opacity: 1; transform: translateY(6px) scale(1.05) rotate(-1deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    }
    @keyframes card-deal {
      0%   { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes pile-collect {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .animate-trick-enter {
      animation: trick-enter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .animate-trick-enter-opp {
      animation: trick-enter-opp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .animate-card-deal {
      animation: card-deal 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .animate-pile-collect {
      animation: pile-collect 0.3s ease-out;
    }
    /* Trump card glow */
    .trump-glow {
      box-shadow: 0 0 12px 2px rgba(251, 191, 36, 0.3), 0 4px 12px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
